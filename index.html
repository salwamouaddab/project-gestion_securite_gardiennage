<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion Sécurité — Espace Agents</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="scripts/conntectedUser.js"></script>
    <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark-main">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-shield-lock-fill text-primary me-2" style="font-size: 1.5rem;"></i>
                <div>
                    <span class="fw-bold">SecuriGuard</span>
                    <small class="d-block text-muted" style="font-size: 0.7rem;">Gestion de Sécurité</small>
                </div>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Tableau de Bord</a></li>
                    <li class="nav-item"><a class="nav-link" href="agents.html">Agents</a></li>
                    <li class="nav-item me-3"><a class="nav-link" href="rondes.html">Rondes</a></li>
                    <li class="nav-item"><a class="nav-link me-2" href="rapports.html">Rapports</a></li>
                    <li class="nav-item">
                        <button class="btn btn-dark-nav btn-sm px-4" data-bs-toggle="modal" data-bs-target="#authModal" id="connexionBtn">
                            <i class="bi bi-box-arrow-in-right me-1"></i> Connexion
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 450px;">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-body p-0">
                    <div class="d-flex border-bottom">
                        <button class="w-50 py-3 border-0 bg-transparent fw-medium active" id="tab-login" onclick="switchTab('login')" style="font-size: 0.95rem;">Se connecter</button>
                        <button class="w-50 py-3 border-0 bg-transparent fw-medium" id="tab-register" onclick="switchTab('register')" style="font-size: 0.95rem;">Créer un compte</button>
                    </div>

                    <div class="p-4" id="pane-login">
                        <form id="loginForm" onsubmit="event.preventDefault();">
                            <div class="mb-3">
                                <label class="form-label text-muted" style="font-size: 0.85rem;">Adresse email</label>
                                <input type="email" class="form-control formItem" id="l-email" placeholder="nom@exemple.com" />
                                <span id="invalid-login-email-feedbak" class="text-danger feedbak"></span>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted" style="font-size: 0.85rem;">Mot de passe</label>
                                <input type="password" class="form-control formItem" id="l-password" placeholder="••••••••" />
                                <span id="invalid-login-password-feedbak" class="text-danger feedbak"></span>
                            </div>
                            <div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" id="remember" />
                                <label class="form-check-label text-muted" for="remember" style="font-size: 0.85rem;">Se souvenir de moi</label>
                            </div>
                            <button class="btn-dark-main w-100" id="loginBtn">Connexion</button>
                        </form>
                    </div>

                    <div class="p-4" id="pane-register" style="display: none;">
                        <form id="registerForm" onsubmit="event.preventDefault();">
                            <div class="mb-3">
                                <label class="form-label text-muted" style="font-size: 0.85rem;">Nom complet</label>
                                <input type="text" class="form-control formItem" id="r-nom" placeholder="Ex: Karim El Fassi" />
                                <span id="invalid-nom-feedbak" class="text-danger feedbak"></span>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted" style="font-size: 0.85rem;">Salaire journalier de base (DH)</label>
                                <input type="number" class="form-control formItem" id="r-salaire" placeholder="Ex: 150" />
                                <span id="invalid-salaire-feedbak" class="text-danger feedbak"></span>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted" style="font-size: 0.85rem;">Adresse email</label>
                                <input type="email" class="form-control formItem" id="r-email" placeholder="nom@exemple.com" />
                                <span id="invalid-email-feedbak" class="text-danger feedbak"></span>
                            </div>
                            <div class="row g-2 mb-4">
                                <div class="col-6">
                                    <label class="form-label text-muted" style="font-size: 0.85rem;">Mot de passe</label>
                                    <input type="password" class="form-control formItem" id="r-password" placeholder="••••••••" />
                                    <span id="invalid-password-feedbak" class="text-danger feedbak"></span>
                                </div>
                                <div class="col-6">
                                    <label class="form-label text-muted" style="font-size: 0.85rem;">Confirmation</label>
                                    <input type="password" class="form-control formItem" id="r-password-confirm" placeholder="••••••••" />
                                    <span id="invalid-password-confirm-feedbak" class="text-danger feedbak"></span>
                                </div>
                            </div>
                            <button class="btn-dark-main w-100" id="registerBtn">Créer mon compte</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function switchTab(tab) {
            const isLogin = tab === 'login';
            document.getElementById('pane-login').style.display = isLogin ? 'block' : 'none';
            document.getElementById('pane-register').style.display = isLogin ? 'none' : 'block';
            document.getElementById('tab-login').classList.toggle('active', isLogin);
            document.getElementById('tab-register').classList.toggle('active', !isLogin);
        }
    </script>
    <script src="scripts/index.js"></script>
</body>

</html>
